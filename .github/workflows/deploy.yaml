name: Smart Retail CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  ACR_NAME: smartretailshr
  RESOURCE_GROUP: rg-smart-retail-shr
  AKS_CLUSTER: demo-shravani

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Login ACR

     uses: docker/login-action@v3

     with:

       registry: ${{ secrets.ACR_LOGIN_SERVER }}

       username: ${{ secrets.ACR_USERNAME }}

       password: ${{ secrets.ACR_PASSWORD }}

    # 4. Build & Push Catalog Service
    - name: Build Catalog Image
      run: |
        docker build -t $ACR_NAME.azurecr.io/catalog-service:${{ github.sha }} ./catalog-service
        docker push $ACR_NAME.azurecr.io/catalog-service:${{ github.sha }}

    # 5. Build & Push Frontend
    - name: Build Frontend Image
      run: |
        docker build -t $ACR_NAME.azurecr.io/frontend:${{ github.sha }} ./frontend
        docker push $ACR_NAME.azurecr.io/frontend:${{ github.sha }}

    # 6. Get AKS credentials
    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
          --resource-group $RESOURCE_GROUP \
          --name $AKS_CLUSTER \
          --overwrite-existing

    # 7. Deploy to AKS
    - name: Deploy to AKS
      run: |
        kubectl set image deployment/catalog-service \
          catalog-service=$ACR_NAME.azurecr.io/catalog-service:${{ github.sha }} \

        kubectl set image deployment/frontend \
          frontend=$ACR_NAME.azurecr.io/frontend:${{ github.sha }} \

    # 8. Verify rollout
    - name: Check Rollout
      run: |
        kubectl rollout status deployment/catalog-service
        kubectl rollout status deployment/frontend
