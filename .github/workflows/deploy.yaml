name: Build And Deploy AKS

on:

 push:

   branches:
     - main

jobs:

 deploy:

   runs-on: ubuntu-latest

   steps:

   - name: Checkout

     uses: actions/checkout@v4

   - name: Login ACR

     uses: docker/login-action@v3

     with:

       registry: ${{ secrets.ACR_LOGIN_SERVER }}

       username: ${{ secrets.ACR_USERNAME }}

       password: ${{ secrets.ACR_PASSWORD }}

   - name: Build Image

     run: |

       docker build \
       -t ${{ secrets.ACR_LOGIN_SERVER }}/catalog-service:${{ github.run_number }} \
       ./services/catalog-service

   - name: Push Image

     run: |

       docker push \
       ${{ secrets.ACR_LOGIN_SERVER }}/catalog-service:${{ github.run_number }}

   - name: Setup Kubectl

     uses: azure/setup-kubectl@v4

   - name: Configure Kubeconfig

     run: |

       mkdir -p ~/.kube

       echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

   - name: Update Deployment

     run: |

       kubectl set image deployment/catalog-service \
       catalog=${{ secrets.ACR_LOGIN_SERVER }}/catalog-service:${{ github.run_number }} \
       
   - name: Build Frontend

     run: |

      docker build \
      -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_number }} \
      ./frontend

   - name: Push Frontend
   
     run: |
   
      docker push \
      ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.run_number }}

